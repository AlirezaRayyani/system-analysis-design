<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>آمار و گزارش‌ها | آوند سنتر</title>

    <!-- فونت وزیر -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --surface: #1e1e1e;
            --card-bg: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --text-muted: #aaaaaa;
            --border: #333;
            --primary: #ff7a00;
            --primary-hover: #e06b00;
            --red: #f44336;
            --green: #4caf50;
            --blue: #2196f3;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --sidebar-bg: rgba(30, 30, 30, 0.8);
            --transition: 0.6s ease;
            --radius: 16px;
        }

        body.light-mode {
            --bg-color: #f5f5f7;
            --surface: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text: #1d1d1f;
            --text-muted: #6e6e73;
            --border: #e0e0e0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --sidebar-bg: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Vazir', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
            position: relative;
            overflow-x: hidden;
        }

        /* دکمه تغییر تم - بالا سمت چپ */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1100; /*بالاتر از همه*/
            transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        /* لوگو ثابت - بالا سمت راست */
        .logo-fixed {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--primary);
            text-decoration: none;
            z-index: 1100;
            letter-spacing: -0.5px;
        }

        /* سایدبار */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 75px 15px;
            transition: right 0.4s ease, background var(--transition);
            position: relative;
            z-index: 10;
        }

        .menu ul {
            list-style: none;
        }
        .menu ul li {
            margin-bottom: 10px;
        }
        .menu ul li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .menu ul li a:hover {
            background: rgba(255, 122, 0, 0.15);
            transform: translateX(-5px);
        }
        .menu ul li a.active {
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(255, 122, 0, 0.4);
        }

        .logout {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout:hover {
            background: var(--red);
            color: #fff;
        }

        /* محتوا */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow-y: auto;
        }

        .top-header {
            margin-top: 2.5rem;
            margin-bottom: 30px;
        }
        .top-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding-right: 160px;
        }

        /* کارت‌های خلاصه */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 25px 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 15px;
            border-right: 4px solid transparent;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
        }
        .stat-card.income {
            border-color: var(--green);
        }
        .stat-card.expense {
            border-color: var(--red);
        }
        .stat-card.balance {
            border-color: var(--blue);
        }
        .stat-card .icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }
        .stat-card.income .icon {
            background: rgba(76, 175, 80, 0.15);
            color: var(--green);
        }
        .stat-card.expense .icon {
            background: rgba(244, 67, 54, 0.15);
            color: var(--red);
        }
        .stat-card.balance .icon {
            background: rgba(33, 150, 243, 0.15);
            color: var(--blue);
        }
        .stat-card .details h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        .stat-card .details .amount {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
        }

        /* بخش نمودارها */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }

        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow);
        }
        .chart-card h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        .chart-container {
            width: 100%;
            height: 300px;
            position: relative;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            z-index: 2000;
            font-weight: 500;
            animation: slideIn 0.3s ease;
            display: none;
        }
        @keyframes slideIn {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        /* منوی همبرگری */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 2rem;
            cursor: pointer;
            position: fixed;
            top: 1.2rem;
            left: 1.5rem;
            z-index: 1200;  /* بالاترین */
            width: 48px;
            height: 48px;
            align-items: center;
            justify-content: center;
        }

        /* حالت موبایل */
        @media (max-width: 900px) {
            .menu-toggle {
                display: flex;
            }
            .theme-toggle {
                left: 5rem;  /* کنار همبرگری */
            }
            .sidebar {
                position: fixed;
                right: -100%;
                top: 0;
                bottom: 0;
                width: 280px;
                z-index: 1050;
                transition: right 0.4s ease;
            }
            .sidebar.open {
                right: 0;
            }
            .sidebar-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1040;
                display: none;
            }
            .sidebar.open ~ .sidebar-backdrop {
                display: block;
            }
            .main-content {
                padding: 80px 20px 30px;
            }
            .top-header h1 {
                padding-right: 80px;
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- دکمه تغییر تم - بالا سمت چپ -->
    <button class="theme-toggle" id="themeToggle" aria-label="تغییر تم">🌙</button>

    <!-- لوگو ثابت بالا سمت راست -->
    <a href="index.html" class="logo-fixed">آوند سنتر</a>

    <!-- دکمه همبرگری موبایل -->
    <button class="menu-toggle" id="menuToggle" aria-label="منو">☰</button>

    <!-- سایدبار -->
    <aside class="sidebar" id="sidebar">
        <div>
            <nav class="menu">
                <ul>
                    <li><a href="dashboard.html"><i class="fa fa-home"></i> داشبورد</a></li>
                    <li><a href="transactions.html"><i class="fa fa-list"></i> تراکنش‌ها</a></li>
                    <li><a href="statistics.html" class="active"><i class="fa fa-chart-pie"></i> آمار و گزارش‌ها</a></li>
                    <li><a href="profile.html"><i class="fa fa-user"></i> پروفایل</a></li>
                </ul>
            </nav>
        </div>
        <button class="logout" id="logoutBtn"><i class="fa fa-sign-out-alt"></i> خروج از حساب</button>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- محتوای اصلی -->
    <main class="main-content">
        <header class="top-header">
            <h1>آمار و گزارش‌ها</h1>
        </header>

        <!-- کارت‌های خلاصه -->
        <div class="summary-cards">
            <div class="stat-card income">
                <div class="icon"><i class="fa fa-arrow-up"></i></div>
                <div class="details">
                    <h3>کل درآمد این ماه</h3>
                    <p class="amount">۱۲,۵۰۰,۰۰۰ تومان</p>
                </div>
            </div>
            <div class="stat-card expense">
                <div class="icon"><i class="fa fa-arrow-down"></i></div>
                <div class="details">
                    <h3>کل هزینه‌های این ماه</h3>
                    <p class="amount">۴,۲۰۰,۰۰۰ تومان</p>
                </div>
            </div>
            <div class="stat-card balance">
                <div class="icon"><i class="fa fa-wallet"></i></div>
                <div class="details">
                    <h3>موجودی خالص</h3>
                    <p class="amount">۸,۳۰۰,۰۰۰ تومان</p>
                </div>
            </div>
        </div>

        <!-- نمودارها -->
        <div class="charts-grid">
            <div class="chart-card">
                <h2>روند مالی (۶ ماه گذشته)</h2>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h2>دسته‌بندی هزینه‌ها</h2>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">پیام</div>

    <script>
        // ========== اجرای همه چیز بعد از آماده شدن کامل DOM ==========
        document.addEventListener('DOMContentLoaded', () => {
            // ========== ارجاع‌ها ==========
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const logoutBtn = document.getElementById('logoutBtn');

            // ========== تنظیم تم ==========
            const savedTheme = localStorage.getItem('theme') || 'dark';
            let trendChart, categoryChart;

            function applyTheme(theme) {
                if (theme === 'light') {
                    body.classList.add('light-mode');
                    if (themeToggle) themeToggle.innerHTML = '☀️';
                } else {
                    body.classList.remove('light-mode');
                    if (themeToggle) themeToggle.innerHTML = '🌙';
                }
                // آپدیت نمودارها (اگر وجود داشتند و Chart موجود باشد)
                try {
                    updateChartsTheme();
                } catch (e) {
                    console.warn('نمودارها به‌روزرسانی نشدند:', e);
                }
            }

            applyTheme(savedTheme);

            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const isLight = body.classList.contains('light-mode');
                    const newTheme = isLight ? 'dark' : 'light';
                    applyTheme(newTheme);
                    localStorage.setItem('theme', newTheme);
                });
            }

            // ========== رسم نمودارها ==========
            function createCharts() {
                const trendCtx = document.getElementById('trendChart');
                const categoryCtx = document.getElementById('categoryChart');

                if (!trendCtx || !categoryCtx) {
                    // canvas هنوز در DOM نیست -> صبر کن
                    setTimeout(createCharts, 50);
                    return;
                }

                // بررسی وجود کتابخانه Chart.js
                if (typeof Chart === 'undefined') {
                    console.warn('Chart.js بارگذاری نشده. نمودارها رسم نمی‌شوند.');
                    return;
                }

                const isLight = body.classList.contains('light-mode');
                const gridColor = isLight ? '#ddd' : '#333';
                const textColor = getComputedStyle(body).getPropertyValue('--text-muted').trim() || '#aaa';

                // نابود کردن نمودارهای قبلی
                if (trendChart) trendChart.destroy();
                if (categoryChart) categoryChart.destroy();

                trendChart = new Chart(trendCtx, {
                    type: 'line',
                    data: {
                        labels: ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور'],
                        datasets: [
                            {
                                label: 'درآمد',
                                data: [12, 19, 15, 22, 30, 28],
                                borderColor: '#2ecc71',
                                backgroundColor: 'rgba(46, 204, 113, 0.1)',
                                tension: 0.4,
                                fill: true,
                            },
                            {
                                label: 'هزینه',
                                data: [8, 12, 10, 15, 20, 18],
                                borderColor: '#ff7a00',
                                backgroundColor: 'rgba(255, 122, 0, 0.1)',
                                tension: 0.4,
                                fill: true,
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: textColor } },
                        },
                        scales: {
                            y: {
                                grid: { color: gridColor },
                                ticks: { color: textColor },
                            },
                            x: {
                                grid: { color: gridColor },
                                ticks: { color: textColor },
                            },
                        },
                    },
                });

                categoryChart = new Chart(categoryCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['خوراک', 'حمل و نقل', 'سرگرمی', 'قبوض', 'سایر'],
                        datasets: [
                            {
                                data: [35, 15, 20, 20, 10],
                                backgroundColor: ['#ff7a00', '#e74c3c', '#3498db', '#f1c40f', '#607d8b'],
                                borderWidth: 0,
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '70%',
                        plugins: {
                            legend: { labels: { color: textColor } },
                        },
                    },
                });
            }

            function updateChartsTheme() {
                if (trendChart || categoryChart) {
                    createCharts();
                }
            }

            // تلاش برای رسم نمودارها در اولین فرصت
            createCharts();
            // همچنین بعد از load (محض اطمینان)
            window.addEventListener('load', () => {
                try { createCharts(); } catch (e) {}
            });

            // ========== منوی همبرگری ==========
            if (menuToggle) {
                menuToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    sidebar.classList.toggle('open');
                });
            }
            if (backdrop) {
                backdrop.addEventListener('click', () => {
                    sidebar.classList.remove('open');
                });
            }

            // بستن منو با کلیک روی لینک‌های داخل سایدبار (اختیاری)
            const sidebarLinks = sidebar.querySelectorAll('a');
            sidebarLinks.forEach(link => {
                link.addEventListener('click', () => {
                    sidebar.classList.remove('open');
                });
            });

            // ========== خروج از حساب ==========
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('authToken');
                    sessionStorage.removeItem('authToken');
                    window.location.href = 'login.html';
                });
            }

            // ========== Toast ==========
            window.showToast = function(message, isError = false) {
                const toast = document.getElementById('toast');
                if (!toast) return;
                toast.textContent = message;
                toast.style.background = isError ? '#f44336' : 'var(--primary)';
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 3000);
            };
        });
    </script>
</body>
</html>

<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>پروفایل و امنیت | آوند سنتر</title>

    <!-- فونت وزیر -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root {
            --bg-color: #121212;
            --surface: #1e1e1e;
            --card-bg: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --text-muted: #aaaaaa;
            --border: #333;
            --primary: #ff7a00;
            --primary-hover: #e06b00;
            --red: #f44336;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --sidebar-bg: rgba(30, 30, 30, 0.8);
            --transition: 0.6s ease;
            --radius: 16px;
        }

        body.light-mode {
            --bg-color: #f5f5f7;
            --surface: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text: #1d1d1f;
            --text-muted: #6e6e73;
            --border: #e0e0e0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --sidebar-bg: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Vazir', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
            position: relative;
            overflow-x: hidden;
        }

        /* دکمه تغییر تم - وسط بالای صفحه */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            left: 30%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
            padding-bottom: 5px;
        }
        .theme-toggle:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        /* لوگو ثابت - بالا سمت راست (تنها برند موجود) */
        .logo-fixed {
            position: fixed;
            top: 1.2rem;
            right: 1.5rem;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--primary);
            text-decoration: none;
            z-index: 1000;
            letter-spacing: -0.5px;
        }

        /* سایدبار */
        .sidebar {
            width: 280px;
            margin-top: 1rem;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 15px;
            transition: width 0.3s, background var(--transition);
            position: relative;
            z-index: 10;
        }

        .menu ul {
            list-style: none;
        }
        .menu ul li {
            margin-bottom: 10px;
        }
        .menu ul li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .menu ul li a:hover {
            background: rgba(255, 122, 0, 0.15);
            transform: translateX(-5px);
        }
        .menu ul li a.active {
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(255, 122, 0, 0.4);
        }

        .logout {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout:hover {
            background: var(--red);
            color: #fff;
        }

        /* محتوا */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow-y: auto;
        }

        .top-header {
            margin-top: 1rem;
            margin-bottom: 30px;
        }
        .top-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
        }

        /* کارت‌های شیشه‌ای */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow);
            transition: background var(--transition), border-color var(--transition);
            display: flex;
            flex-direction: column;
        }

        .card h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* آواتار */
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            background: var(--bg-color);
        }
        .avatar-upload-btn {
            background: var(--primary);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        .avatar-upload-btn:hover {
            background: var(--primary-hover);
        }
        .avatar-upload-input {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: border 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.2);
        }
        .form-group input::placeholder {
            color: #666;
        }
        .form-group input:disabled {
            background: #2a2a2a;
            cursor: not-allowed;
            color: #888;
        }
        body.light-mode .form-group input:disabled {
            background: #e5e5e5;
        }

        /* نمایش / مخفی رمز */
        .password-wrapper {
            position: relative;
        }
        .toggle-pwd {
            position: absolute;
            left: 12px;
            top: 0;
            height: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }
        .toggle-pwd:hover {
            color: var(--primary);
        }
        .password-wrapper input {
            padding-left: 45px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .primary-btn {
            background: var(--primary);
            color: #fff;
        }
        .primary-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
        }
        .primary-btn:disabled {
            background: #555;
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            z-index: 2000;
            font-weight: 500;
            animation: slideIn 0.3s ease;
            display: none;
        }
        @keyframes slideIn {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        /* منوی همبرگری */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.8rem;
            cursor: pointer;
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 1001;
        }

        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                right: -100%;
                top: 0;
                bottom: 0;
                width: 280px;
                z-index: 100;
                transition: right 0.4s ease;
            }
            .sidebar.open {
                right: 0;
            }
            .sidebar-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 99;
                display: none;
            }
            .sidebar.open ~ .sidebar-backdrop {
                display: block;
            }
            .menu-toggle {
                display: block;
            }
            .main-content {
                padding: 80px 20px 30px;
            }
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- دکمه تغییر تم - وسط بالا -->
    <button class="theme-toggle" id="themeToggle" aria-label="تغییر تم">🌙</button>

    <!-- لوگو ثابت بالا سمت راست (تنها برند) -->
    <a href="index.html" class="logo-fixed">آوند سنتر</a>

    <!-- دکمه همبرگری موبایل -->
    <button class="menu-toggle" id="menuToggle" aria-label="منو">☰</button>

    <!-- سایدبار (بدون لوگوی تکراری) -->
    <aside class="sidebar" id="sidebar">
        <div>
            <nav class="menu">
                <ul>
                    <li><a href="dashboard.html"><i class="fa fa-home"></i> داشبورد</a></li>
                    <li><a href="transactions.html"><i class="fa fa-list"></i> تراکنش‌ها</a></li>
                    <li><a href="statistics.html"><i class="fa fa-chart-pie"></i> آمار و گزارش‌ها</a></li>
                    <li><a href="profile.html" class="active"><i class="fa fa-user"></i> پروفایل</a></li>
                </ul>
            </nav>
        </div>
        <button class="logout" id="logoutBtn"><i class="fa fa-sign-out-alt"></i> خروج از حساب</button>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- محتوای اصلی -->
    <main class="main-content">
        <header class="top-header">
            <h1>پروفایل و امنیت</h1>
        </header>

        <section class="profile-grid">
            <!-- کارت اطلاعات کاربری -->
            <div class="card">
                <h2><i class="fa fa-user-circle"></i> اطلاعات کاربری</h2>
                <div class="avatar-section">
                    <img
                        id="avatarPreview"
                        class="avatar-preview"
                        src="https://via.placeholder.com/80x80?text=Avatar"
                        alt="آواتار کاربر"
                    />
                    <div>
                        <label for="avatarInput" class="avatar-upload-btn">
                            <i class="fa fa-camera"></i> تغییر آواتار
                        </label>
                        <input type="file" id="avatarInput" class="avatar-upload-input" accept="image/*" />
                    </div>
                </div>

                <form id="profileForm">
                    <div class="form-group">
                        <label for="fullname">نام و نام خانوادگی</label>
                        <input type="text" id="fullname" value="کاربر نمونه" disabled />
                    </div>
                    <div class="form-group">
                        <label for="email">ایمیل</label>
                        <input type="email" id="email" value="user@example.com" disabled />
                    </div>
                    <div class="form-group">
                        <label for="joinDate">تاریخ عضویت</label>
                        <input type="text" id="joinDate" value="۱۴۰۳/۰۲/۱۵" disabled />
                    </div>
                    <button type="submit" class="btn primary-btn" disabled id="profileSubmit">
                        ذخیره تغییرات
                    </button>
                </form>
            </div>

            <!-- کارت تغییر رمز عبور -->
            <div class="card">
                <h2><i class="fa fa-lock"></i> تغییر رمز عبور</h2>
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="currentPassword">رمز عبور فعلی</label>
                        <div class="password-wrapper">
                            <input type="password" id="currentPassword" placeholder="رمز عبور فعلی خود را وارد کنید" />
                            <button type="button" class="toggle-pwd" aria-label="نمایش رمز">👁️</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">رمز عبور جدید</label>
                        <div class="password-wrapper">
                            <input type="password" id="newPassword" placeholder="حداقل ۸ کاراکتر" />
                            <button type="button" class="toggle-pwd" aria-label="نمایش رمز">👁️</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">تکرار رمز عبور جدید</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="رمز عبور جدید را تکرار کنید" />
                            <button type="button" class="toggle-pwd" aria-label="نمایش رمز">👁️</button>
                        </div>
                    </div>
                    <button type="submit" class="btn primary-btn" id="passwordSubmit">
                        تغییر رمز عبور
                    </button>
                </form>
            </div>
        </section>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">پیام</div>

    <script>
        // ===== مدیریت تم =====
        const body = document.body;
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        const applyTheme = (theme) => {
            if (theme === 'light') {
                body.classList.add('light-mode');
                themeToggle.innerHTML = '☀️';
            } else {
                body.classList.remove('light-mode');
                themeToggle.innerHTML = '🌙';
            }
        };
        applyTheme(savedTheme);
        themeToggle.addEventListener('click', () => {
            const isLight = body.classList.contains('light-mode');
            const newTheme = isLight ? 'dark' : 'light';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // ===== نمایش / مخفی‌سازی رمز عبور =====
        document.querySelectorAll('.toggle-pwd').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = btn.parentElement.querySelector('input');
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                btn.textContent = isPassword ? '🙈' : '👁️';
            });
        });

        // ===== پیش‌نمایش آواتار و فعال‌سازی دکمه ذخیره =====
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');
        const profileSubmit = document.getElementById('profileSubmit');

        avatarInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    avatarPreview.src = e.target.result;
                    profileSubmit.disabled = false; // فعال‌سازی دکمه
                };
                reader.readAsDataURL(file);
            }
        });

        // ===== فرم اطلاعات کاربری (ذخیره آواتار) =====
        const profileForm = document.getElementById('profileForm');
        profileForm.addEventListener('submit', (e) => {
            e.preventDefault();
            profileSubmit.innerHTML = '<i class="fa fa-spinner fa-spin"></i> در حال ذخیره...';
            profileSubmit.disabled = true;

            setTimeout(() => {
                showToast('اطلاعات و آواتار با موفقیت ذخیره شد.');
                profileSubmit.innerHTML = 'ذخیره تغییرات';
                profileSubmit.disabled = true; // دوباره غیرفعال
            }, 1200);
        });

        // ===== فرم تغییر رمز عبور =====
        const passwordForm = document.getElementById('passwordForm');
        const passwordSubmit = document.getElementById('passwordSubmit');
        passwordForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const currentPass = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (!currentPass || !newPass || !confirmPass) {
                showToast('لطفاً تمام فیلدها را پر کنید.', true);
                return;
            }
            if (newPass !== confirmPass) {
                showToast('رمز عبور جدید و تکرار آن یکسان نیست.', true);
                return;
            }
            if (newPass.length < 8) {
                showToast('رمز عبور جدید باید حداقل ۸ کاراکتر باشد.', true);
                return;
            }

            passwordSubmit.innerHTML = '<i class="fa fa-spinner fa-spin"></i> در حال تغییر...';
            passwordSubmit.disabled = true;

            setTimeout(() => {
                showToast('رمز عبور با موفقیت تغییر کرد.');
                passwordForm.reset();
                passwordSubmit.innerHTML = 'تغییر رمز عبور';
                passwordSubmit.disabled = false;
            }, 1500);
        });

        // ===== خروج از حساب =====
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('authToken');
            sessionStorage.removeItem('authToken');
            window.location.href = 'login.html';
        });

        // ===== منوی موبایل =====
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('sidebarBackdrop');
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });
        backdrop.addEventListener('click', () => {
            sidebar.classList.remove('open');
        });

        // ===== تابع Toast =====
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = isError ? '#f44336' : 'var(--primary)';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>

<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ورود | آوندسنتر</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v18.0.0/dist/font-face.css" />

    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --muted: #a0a0a0;
            --primary: #ff7a00;
            --primary-hover: #e06b00;
            --border: #333;
            --card-bg: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(128, 128, 128, 0.12);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            --logo-gradient: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
            --toggle-bg: #2a2a2a;
        }

        body.light-mode {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --primary: #ff7a00;
            --primary-hover: #e06b00;
            --border: #e0e0e0;
            --card-bg: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(0, 0, 0, 0.05);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --logo-gradient: linear-gradient(135deg, #1d1d1f 0%, #4a4a4f 100%);
            --toggle-bg: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazir', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.7s ease, color 0.7s ease;
            overflow-x: hidden;
            position: relative;
        }

        .page-container {
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* دکمه تم */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 100;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* لوگو */
        .logo-link {
            position: fixed;
            top: 1.7rem;
            right: 1.7rem;
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .logo-link:hover {
            opacity: 0.8;
        }

        /* کارت ورود */
        .login-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            margin-top: 60px;
        }

        .login-card h2 {
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        /* فرم */
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--muted);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 15px;
            padding-left: 45px;
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            direction: ltr;
            text-align: left;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.15);
        }

        .toggle-password {
            position: absolute;
            left: 12px;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            transition: color 0.3s;
            z-index: 2;
            line-height: 1;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        /* چک باکس و لینک فراموشی */
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: var(--muted);
            cursor: pointer;
        }

        .remember-me input {
            margin-left: 8px;
            accent-color: var(--primary);
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .forgot-password:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* دکمه ورود */
        .btn-submit {
            width: 100%;
            padding: 13px;
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.8;
            cursor: not-allowed;
            transform: none;
        }

        /* لینک ثبت‌نام */
        .signup-link {
            text-align: center;
            margin-top: 25px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /* واکنش‌گرایی */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                border-radius: 16px;
            }

            .theme-toggle,
            .logo-link {
                top: 1rem;
            }
            .theme-toggle {
                left: 1rem;
            }
            .logo-link {
                right: 1rem;
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <!-- دکمه تغییر تم -->
    <button class="theme-toggle" id="themeToggle" aria-label="تغییر تم">🌙</button>

    <!-- لینک به صفحه اصلی -->
    <a href="index.html" class="logo-link">آوندسنتر</a>

    <div class="page-container">
        <div class="login-card">
            <h2>خوش آمدید!</h2>
            <p class="subtitle">لطفاً برای ورود به پنل کاربری، اطلاعات خود را وارد کنید.</p>

            <form id="loginForm">
                <!-- ایمیل -->
                <div class="input-group">
                    <label for="email">پست الکترونیک</label>
                    <div class="input-wrapper">
                        <input
                            type="email"
                            id="email"
                            placeholder="example@mail.com"
                            required
                        />
                    </div>
                </div>

                <!-- رمز عبور -->
                <div class="input-group">
                    <label for="password">رمز عبور</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="password"
                            placeholder="********"
                            required
                        />
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="نمایش رمز">
                            👁️
                        </button>
                    </div>
                </div>

                <!-- چک‌باکس و لینک فراموشی -->
                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" />
                        مرا به خاطر بسپار
                    </label>
                    <a href="forgot-password.html" class="forgot-password">رمز عبور را فراموش کرده‌اید؟</a>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">ورود به حساب</button>
            </form>

            <p class="signup-link">
                حساب کاربری ندارید؟ <a href="signup.html">ثبت‌نام کنید</a>
            </p>
        </div>
    </div>

    <script>
        // مدیریت تم تیره/روشن
        const body = document.body;
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme');
        const setThemeIcon = (theme) => {
            themeToggle.textContent = theme === 'light' ? '☀️' : '🌙';
        };
        const applyTheme = (theme) => {
            if (theme === 'light') {
                body.classList.add('light-mode');
                setThemeIcon('light');
            } else {
                body.classList.remove('light-mode');
                setThemeIcon('dark');
            }
        };
        applyTheme(savedTheme === 'light' ? 'light' : 'dark');
        themeToggle.addEventListener('click', () => {
            const isLight = body.classList.contains('light-mode');
            const newTheme = isLight ? 'dark' : 'light';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // نمایش/مخفی رمز عبور
        const togglePasswordBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePasswordBtn.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // مدیریت ورود
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = passwordInput.value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!email || !password) {
                alert('لطفاً ایمیل و رمز عبور را وارد کنید.');
                return;
            }

            // شبیه‌سازی بارگزاری
            submitBtn.disabled = true;
            submitBtn.textContent = 'در حال احراز هویت...';

            setTimeout(() => {
                // ذخیره‌سازی توکن (نمادین)
                if (rememberMe) {
                    localStorage.setItem('authToken', 'demo-token-123');
                } else {
                    sessionStorage.setItem('authToken', 'demo-token-123');
                }

                // هدایت به داشبورد یا صفحه تراکنش‌ها
                window.location.href = 'transactions.html';
            }, 1200);
        });
    </script>
</body>
</html>
